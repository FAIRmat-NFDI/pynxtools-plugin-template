name: Upload Python Package

on:
  release:
    types: [published]

env:
  python-version: 3.12
  {%- if cookiecutter.include_north_tools %}
  IMAGE: "ghcr.io/{{cookiecutter.__github_username|lower}}/{{cookiecutter.__package_name}}"
  {%- endif %}

jobs:
  {%- if cookiecutter.include_north_tools %}
  build-docker-image:
    name: Build NORTH Docker Image
    uses: ./.github/workflows/publish-north.yml
    secrets: inherit
  {% endif %}
  setup:
    name: Checkout and Install
    runs-on: ubuntu-latest
    outputs:
      git_tag_version: {% raw %}${{ steps.git_tag_version.outputs.version }}{% endraw %}
      citation_version: {% raw %}${{ steps.citation_version.outputs.version }}{% endraw %}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install uv and set the python version to {% raw %}${{ env.python-version }}{% endraw %}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: {% raw %}${{ env.python-version }}{% endraw %}
      - name: Git tag version
        id: git_tag_version
        run: |
          GIT_TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$GIT_TAG_VERSION" >> "$GITHUB_OUTPUT"
      - name: Citation version
        id: citation_version
        run: |
          CITATION_VERSION=$(grep '^version:' CITATION.cff | cut -d' ' -f2)
          echo "version=$CITATION_VERSION" >> "$GITHUB_OUTPUT"

  test:
    name: Run Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install uv and set the python version to {% raw %}${{ env.python-version }}{% endraw %}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: {% raw %}${{ env.python-version }}{% endraw %}
      - name: Install latest nomad release
        run: |
          uv pip install nomad-lab[infrastructure]
      - name: Install {{cookiecutter.__package_name}}
        run: |
          uv pip install -e ".[dev]"
      - name: Test with pytest
        run: pytest tests/

  compare-versions:
    name: Compare Versions
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Fail if versions mismatch
        run: |
          if [ {% raw %}"${{ needs.setup.outputs.git_tag_version }}"{% endraw %} != {% raw %}"${{ needs.setup.outputs.citation_version }}"{% endraw %} ]; then
            echo "Version mismatch: Git tag is {% raw %}${{ needs.setup.outputs.git_tag_version }}{% endraw %}, CITATION.cff is {% raw %}${{ needs.setup.outputs.citation_version }}{% endraw %}"
            exit 1
          fi

  build:
    name: Build Package
    needs:
      - compare-versions
      - test
      {%- if cookiecutter.include_north_tools %}
      - build-docker-image
      {% endif %}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install uv and set the python version to {% raw %}${{ env.python-version }}{% endraw %}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: {% raw %}${{ env.python-version }}{% endraw %}
      {% if cookiecutter.include_north_tools %}
      - name: Overwrite the image tag
        run: |
          {% raw %}IMAGE_TAG=$(grep -oP "${{ env.IMAGE }}:\K[^'\",]+" {% endraw %}src/{{cookiecutter.__module_name}}/nomad/north_tools/__init__.py)
          {% raw %}sed -i "s|${{ env.IMAGE }}:${IMAGE_TAG}|${{ env.IMAGE }}:${GITHUB_REF_NAME}|g" \{% endraw %}
          src/{{cookiecutter.__module_name}}/nomad/north_tools/__init__.py
      {% endif %}
      - name: Build package
        run: uv build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/

  deploy:
    name: Upload to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/{{cookiecutter.__package_name}}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1